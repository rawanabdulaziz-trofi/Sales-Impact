<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --ink: #1a1a1a;
    --muted: #8b8680;
    --line: #e8e3da;
    --eid: #f4c430;
    --break: #6ba368;
    --exam: #d94e3f;
    --intl: #4a7ab8;
    --payday: #2d5f3f;
    --weekend: #d4cfc4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Space Grotesk', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 40px 20px;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(217, 78, 63, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(244, 196, 48, 0.04) 0%, transparent 50%);
  }

  .container { max-width: 1100px; margin: 0 auto; }

  .header {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 30px;
    border-bottom: 2px solid var(--ink);
    position: relative;
  }

  .header::after {
    content: "";
    position: absolute;
    bottom: -7px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 12px;
    background: var(--bg);
    border-bottom: 2px solid var(--ink);
  }

  .header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 400;
    letter-spacing: -1px;
    margin-bottom: 8px;
    font-style: italic;
  }

  .header .subtitle {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .navigation {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 30px;
    gap: 20px;
    flex-wrap: wrap;
  }

  .nav-btn {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 14px 24px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    border-radius: 2px;
    letter-spacing: 0.5px;
  }

  .nav-btn:hover { background: var(--exam); transform: translateY(-1px); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .month-display { flex: 1; text-align: center; min-width: 200px; }

  .month-display .month-name {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(28px, 3.5vw, 40px);
    font-weight: 400;
    font-style: italic;
  }

  .month-display .year {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 4px;
    margin-top: 4px;
    font-weight: 500;
  }

  .calendar {
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 8px 8px 0 var(--ink);
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--ink);
    color: var(--bg);
  }

  .weekday {
    padding: 14px 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .days { display: grid; grid-template-columns: repeat(7, 1fr); }

  .day {
    aspect-ratio: 1 / 1;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    position: relative;
    min-height: 90px;
    overflow: hidden;
  }

  .day:nth-child(7n) { border-right: none; }

  .day-bg { position: absolute; inset: 0; z-index: 0; width: 100%; height: 100%; }

  .day-content {
    position: relative;
    z-index: 1;
    padding: 10px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .day.empty {
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 8px,
      rgba(0,0,0,0.02) 8px,
      rgba(0,0,0,0.02) 16px
    );
  }

  .day-number {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-weight: 400;
    line-height: 1;
  }

  .day-label {
    font-size: 11px;
    line-height: 1.25;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .day.weekend .day-bg { background: var(--weekend); }
  .day.weekend .day-number { opacity: 0.5; }

  .bg-eid { background: var(--eid); }
  .bg-break { background: var(--break); }
  .bg-exam { background: var(--exam); }
  .bg-intl { background: var(--intl); }
  .bg-payday { background: var(--payday); }

  .day.text-light .day-number,
  .day.text-light .day-label { color: #fff; }

  .day.today .day-number {
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-underline-offset: 4px;
  }

  .legend {
    margin-top: 30px;
    padding: 24px;
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 4px;
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .legend-swatch {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.1);
  }

  @media (max-width: 600px) {
    body { padding: 20px 10px; }
    .day { min-height: 65px; }
    .day-content { padding: 6px; }
    .day-number { font-size: 16px; }
    .day-label { font-size: 8px; }
    .weekday { font-size: 9px; padding: 10px 4px; letter-spacing: 1px; }
    .calendar { box-shadow: 4px 4px 0 var(--ink); }
  }
</style>
</head>

  // Auto-fill summer break gaps
  function fillRange(startDate, endDate, type, label) {
    for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (!events[key]) {
        events[key] = { type, label };
      }
    }
  }
  fillRange(new Date(2025, 5, 27), new Date(2025, 7, 23), 'break', 'Summer Break');
  fillRange(new Date(2026, 5, 19), new Date(2026, 7, 22), 'break', 'Summer Break');

  const monthNames = [
    'January', 'February', 'March', 'April', 'May', 'June',
    'July', 'August', 'September', 'October', 'November', 'December'
  ];

  const darkBgs = ['exam', 'intl', 'payday'];
  const minDate = { year: 2025, month: 0 };
  const maxDate = { year: 2026, month: 11 };

  let current = new Date();
  let currentYear = current.getFullYear();
  let currentMonth = current.getMonth();
  if (currentYear < 2025) { currentYear = 2025; currentMonth = 0; }
  if (currentYear > 2026) { currentYear = 2026; currentMonth = 11; }

  function pad(n) { return n < 10 ? '0' + n : n; }
  function formatDate(year, month, day) { return `${year}-${pad(month + 1)}-${pad(day)}`; }
  function getColorVar(type) { return `var(--${type})`; }

  function renderCalendar() {
    document.getElementById('monthName').textContent = monthNames[currentMonth];
    document.getElementById('yearDisplay').textContent = currentYear;

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const today = new Date();
    const isCurrentMonth = today.getFullYear() === currentYear && today.getMonth() === currentMonth;

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day empty';
      grid.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const cell = document.createElement('div');
      cell.className = 'day';

      const dateKey = formatDate(currentYear, currentMonth, day);
      const dayOfWeek = new Date(currentYear, currentMonth, day).getDay();
      const event = events[dateKey];

      const bg = document.createElement('div');
      bg.className = 'day-bg';

      if (Array.isArray(event)) {
        const c1 = getColorVar(event[0].type);
        const c2 = getColorVar(event[1].type);
        bg.style.background = `linear-gradient(135deg, ${c1} 0%, ${c1} 50%, ${c2} 50%, ${c2} 100%)`;
      } else if (event) {
        bg.classList.add('bg-' + event.type);
      } else if (dayOfWeek === 5 || dayOfWeek === 6) {
        cell.classList.add('weekend');
      }

      cell.appendChild(bg);

      let useLight = false;
      if (Array.isArray(event)) {
        const bothDark = darkBgs.includes(event[0].type) && darkBgs.includes(event[1].type);
        if (bothDark) useLight = true;
      } else if (event && darkBgs.includes(event.type)) {
        useLight = true;
      }
      if (useLight) cell.classList.add('text-light');

      const content = document.createElement('div');
      content.className = 'day-content';

      const num = document.createElement('div');
      num.className = 'day-number';
      num.textContent = day;
      content.appendChild(num);

      if (event) {
        const labelWrap = document.createElement('div');
        if (Array.isArray(event)) {
          const l1 = document.createElement('div');
          l1.className = 'day-label';
          l1.textContent = event[0].label;
          const l2 = document.createElement('div');
          l2.className = 'day-label';
          l2.textContent = event[1].label;
          l2.style.marginTop = '2px';
          labelWrap.appendChild(l1);
          labelWrap.appendChild(l2);
        } else {
          const l = document.createElement('div');
          l.className = 'day-label';
          l.textContent = event.label;
          labelWrap.appendChild(l);
        }
        content.appendChild(labelWrap);
      }

      cell.appendChild(content);

      if (isCurrentMonth && today.getDate() === day) {
        cell.classList.add('today');
      }

      grid.appendChild(cell);
    }

    document.getElementById('prevBtn').disabled =
      (currentYear === minDate.year && currentMonth === minDate.month);
    document.getElementById('nextBtn').disabled =
      (currentYear === maxDate.year && currentMonth === maxDate.month);
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (currentMonth === 0) { currentMonth = 11; currentYear--; }
    else { currentMonth--; }
    renderCalendar();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    if (currentMonth === 11) { currentMonth = 0; currentYear++; }
    else { currentMonth++; }
    renderCalendar();
  });

  renderCalendar();
</script>
</body>
</html>
